# v10 final wear-cost sweep - B2 (4 runs)
# 4 runs = 4 (wear_cost)
params:
  # Fixed reward baseline (selected after v7-v9)
  rl.reward.coeff_economic: [2.6]
  rl.reward.coeff_action_violation: [0.4]
  rl.reward.coeff_action_smoothness: [0.03]
  rl.reward.coeff_action_sign_change: [0.05]
  rl.reward.coeff_micro_throughput: [1.0]
  rl.reward.micro_throughput_kwh: [0.12]
  rl.reward.coeff_soc_violation: [0.15]
  rl.reward.coeff_bad_logic: [0.5]
  rl.reward.sell_discount: [0.75]

  # Sweep: wear cost scale
  rl.reward.coeff_wear_cost: [0.2, 0.35, 0.6, 1.0]

  # Fixed PPO baseline
  rl.ppo.learning_rate: [3.0e-4]
  rl.ppo.clip_range: [0.15]
  rl.ppo.ent_coef: [1.0e-3]
  rl.ppo.n_steps: [1024]
  rl.tb_reasoning_plot_every: [0]


  # Tensorboard logging options
  rl.tb_enable_figures: false      # disabilita tutte le immagini/figure
  rl.tb_enable_histograms: false   # disabilita tutte le distribuzioni/hist


seeds: [42]
